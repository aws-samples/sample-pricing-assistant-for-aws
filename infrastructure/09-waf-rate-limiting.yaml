AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Pricing Assistant - WAF Rate Limiting for CloudFront'

Parameters:
  ProjectName:
    Type: String
    Default: aws-pricing-assistant
    Description: Name of the project for resource naming
  
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name

Resources:
  # WAF Web ACL for CloudFront
  CloudFrontWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-cloudfront-waf
      Scope: CLOUDFRONT
      Description: Rate limiting and security rules for CloudFront distribution
      DefaultAction:
        Allow: {}
      Rules:
        # Rate limit for general requests - 2000 per 5 minutes per IP
        - Name: RateLimitGeneral
          Priority: 1
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                CustomResponseBodyKey: RateLimitExceeded
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitGeneral

        # Rate limit for API routes - 1000 per 5 minutes per IP
        - Name: RateLimitAPI
          Priority: 2
          Statement:
            RateBasedStatement:
              Limit: 1000
              AggregateKeyType: IP
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch:
                    UriPath: {}
                  PositionalConstraint: STARTS_WITH
                  SearchString: /api/
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                CustomResponseBodyKey: RateLimitExceeded
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitAPI

        # Rate limit for WebSocket connections - 500 per 5 minutes per IP
        - Name: RateLimitWebSocket
          Priority: 3
          Statement:
            RateBasedStatement:
              Limit: 500
              AggregateKeyType: IP
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch:
                    UriPath: {}
                  PositionalConstraint: STARTS_WITH
                  SearchString: /ws/
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                CustomResponseBodyKey: RateLimitExceeded
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitWebSocket

      CustomResponseBodies:
        RateLimitExceeded:
          ContentType: APPLICATION_JSON
          Content: '{"error": "Rate limit exceeded. Please try again later."}'
      
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub ${ProjectName}-${Environment}-waf

Outputs:
  WebACLId:
    Description: ID of the WAF Web ACL
    Value: !GetAtt CloudFrontWebACL.Id
    Export:
      Name: !Sub ${ProjectName}-${Environment}-waf-webacl-id

  WebACLArn:
    Description: ARN of the WAF Web ACL
    Value: !GetAtt CloudFrontWebACL.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-waf-webacl-arn
