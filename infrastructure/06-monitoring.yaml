AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Pricing Assistant - CloudWatch Monitoring Dashboard and Alerts'

Parameters:
  ProjectName:
    Type: String
    Default: aws-pricing-assistant
    Description: Name of the project for resource naming
  
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name

  AlertEmail:
    Type: String
    Default: admin@example.com
    Description: Email address for alerts (change this to your email)

# Import values from other stacks
Mappings: {}

Resources:
  # SNS Topic for Alerts
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-${Environment}-alerts
      DisplayName: AWS Pricing Assistant Alerts

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref AlertTopic
      Endpoint: !Ref AlertEmail

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${ProjectName}-${Environment}-monitoring
      DashboardBody: !Sub 
        - |
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${ALBName}" ],
                    [ ".", "TargetResponseTime", ".", "." ],
                    [ ".", "HTTPCode_Target_4XX_Count", ".", "." ],
                    [ ".", "HTTPCode_Target_5XX_Count", ".", "." ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AWS::Region}",
                  "title": "ALB Metrics",
                  "period": 300
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ECS", "CPUUtilization", "ServiceName", "${ProjectName}-${Environment}-backend", "ClusterName", "${ECSClusterName}" ],
                    [ ".", "MemoryUtilization", ".", ".", ".", "." ],
                    [ ".", "CPUUtilization", "ServiceName", "${ProjectName}-${Environment}-frontend", "ClusterName", "${ECSClusterName}" ],
                    [ ".", "MemoryUtilization", ".", ".", ".", "." ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AWS::Region}",
                  "title": "ECS Service Metrics",
                  "period": 300
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/Bedrock", "Invocations", "ModelId", "us.anthropic.claude-opus-4-6-v1" ],
                    [ ".", "InvocationLatency", ".", "." ],
                    [ ".", "Invocations", "ModelId", "us.anthropic.claude-sonnet-4-5-20250929-v1:0" ],
                    [ ".", "InvocationLatency", ".", "." ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AWS::Region}",
                  "title": "Bedrock Converse API Metrics",
                  "period": 300
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/CloudFront", "Requests", "DistributionId", "${CloudFrontDistId}", "Region", "Global" ],
                    [ ".", "4xxErrorRate", ".", ".", ".", "." ],
                    [ ".", "5xxErrorRate", ".", ".", ".", "." ],
                    [ ".", "CacheHitRate", ".", ".", ".", "." ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "us-east-1",
                  "title": "CloudFront CDN Metrics",
                  "period": 300
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 12,
                "width": 6,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/WAFV2", "BlockedRequests", "WebACL", "${ProjectName}-${Environment}-cloudfront-waf", "Region", "us-east-1", "Rule", "RateLimitGeneral" ],
                    [ ".", ".", ".", ".", ".", ".", ".", "RateLimitAPI" ],
                    [ ".", ".", ".", ".", ".", ".", ".", "RateLimitWebSocket" ],
                    [ ".", "AllowedRequests", ".", ".", ".", ".", ".", "ALL" ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "us-east-1",
                  "title": "WAF Rate Limiting",
                  "period": 300
                }
              },
              {
                "type": "metric",
                "x": 6,
                "y": 12,
                "width": 6,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "${ProjectName}/${Environment}", "FileUploads" ],
                    [ ".", "BackendErrors" ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AWS::Region}",
                  "title": "Application Metrics",
                  "period": 300
                }
              },
              {
                "type": "metric",
                "x": 6,
                "y": 12,
                "width": 6,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/S3", "NumberOfObjects", "BucketName", "${S3BucketName}", "StorageType", "AllStorageTypes" ],
                    [ ".", "BucketSizeBytes", ".", ".", ".", "StandardStorage" ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AWS::Region}",
                  "title": "S3 Storage Metrics",
                  "period": 86400
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 12,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '/ecs/${ProjectName}-${Environment}-backend' | fields @timestamp, @message | filter @message like /\"level\":\"error\"/ | sort @timestamp desc | limit 20",
                  "region": "${AWS::Region}",
                  "title": "Recent Backend Errors",
                  "view": "table"
                }
              }
            ]
          }
        - ALBName: 
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-alb-name
          ECSClusterName:
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-ecs-cluster-name
          S3BucketName:
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-file-storage-bucket-name
          CloudFrontDistId:
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-cloudfront-id

  # CloudWatch Alarms
  ALBHighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-alb-high-error-rate
      AlarmDescription: ALB error rate is too high
      MetricName: HTTPCode_Target_5XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      Dimensions:
        - Name: LoadBalancer
          Value: 
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-alb-name

  ALBHighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-alb-high-latency
      AlarmDescription: ALB response time is too high
      MetricName: TargetResponseTime
      Namespace: AWS/ApplicationELB
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 3.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      Dimensions:
        - Name: LoadBalancer
          Value: 
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-alb-name

  ECSHighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-ecs-high-cpu
      AlarmDescription: ECS service CPU utilization is too high
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      Dimensions:
        - Name: ServiceName
          Value: !Sub ${ProjectName}-${Environment}-backend
        - Name: ClusterName
          Value: 
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-ecs-cluster-name

  LambdaErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-lambda-errors
      AlarmDescription: Lambda function error rate is too high
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      Dimensions:
        - Name: FunctionName
          Value: !Sub ${ProjectName}-${Environment}-validation

  BedrockInvocationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-bedrock-high-invocations
      AlarmDescription: Bedrock invocation count exceeds threshold - potential API abuse
      MetricName: Invocations
      Namespace: AWS/Bedrock
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic

  # Custom Metrics for Application
  CustomMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}-${Environment}-backend
      FilterPattern: '[timestamp, request_id, level="ERROR", ...]'
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${Environment}
          MetricName: BackendErrors
          MetricValue: '1'
          DefaultValue: 0

  FileUploadMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}-${Environment}-backend
      FilterPattern: '[timestamp, request_id, level, message="File uploaded successfully", ...]'
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${Environment}
          MetricName: FileUploads
          MetricValue: '1'
          DefaultValue: 0

Outputs:
  DashboardURL:
    Description: URL to the CloudWatch Dashboard
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ProjectName}-${Environment}-monitoring'
    Export:
      Name: !Sub ${ProjectName}-${Environment}-dashboard-url

  AlertTopicArn:
    Description: ARN of the SNS topic for alerts
    Value: !Ref AlertTopic
    Export:
      Name: !Sub ${ProjectName}-${Environment}-alert-topic-arn
