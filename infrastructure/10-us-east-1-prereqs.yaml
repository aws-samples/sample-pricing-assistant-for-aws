AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Pricing Assistant - us-east-1 Prerequisites (Pipeline Artifact Bucket for cross-region deployments)'

Parameters:
  ProjectName:
    Type: String
    Default: aws-pricing-assistant
    Description: Name of the project for resource naming
  
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name

Resources:
  PipelineArtifactsBucketEast:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-pipeline-east-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

Outputs:
  PipelineArtifactsBucketEast:
    Description: S3 bucket for cross-region pipeline artifacts
    Value: !Ref PipelineArtifactsBucketEast
    Export:
      Name: !Sub ${ProjectName}-${Environment}-pipeline-artifacts-east
