AWSTemplateFormatVersion: '2010-09-09'
Description: |
  AWS Pricing Assistant — Bedrock cost cap.
  Defines an AWS Budget on Bedrock spend with a budget action that attaches a
  deny-all-Bedrock managed policy to the ECS task role when monthly spend
  exceeds the configured threshold. This is the hard-stop counterpart to the
  CloudWatch BedrockInvocationAlarm in 06-monitoring.yaml, which only alerts.

Parameters:
  ProjectName:
    Type: String
    Default: aws-pricing-assistant
    Description: Name of the project for resource naming

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name

  MonthlyBudgetUSD:
    Type: Number
    Default: 100
    MinValue: 1
    Description: Monthly Bedrock-spend ceiling in USD. When breached, the budget
      action attaches a deny policy to the ECS task role until manually reset.

  BudgetAlertEmail:
    Type: String
    Description: Email address to notify on budget alerts (forecast and actual breach).

Resources:
  # Managed policy that, when attached to the ECS task role, denies all Bedrock
  # invocations. The budget action below attaches this on cap breach.
  BedrockDenyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${ProjectName}-${Environment}-bedrock-deny
      Description: Denies Bedrock invoke calls. Attached automatically by Budgets
        when the monthly Bedrock spend cap is breached.
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
              - bedrock:Converse
              - bedrock:ConverseStream
            Resource: '*'

  # IAM role that AWS Budgets assumes to perform the action.
  BudgetActionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-budget-action-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: budgets.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AttachDenyPolicyToTaskRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-${Environment}-ecs-task-role

  # Cost budget scoped to the Bedrock service.
  BedrockMonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub ${ProjectName}-${Environment}-bedrock-monthly
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUSD
          Unit: USD
        CostFilters:
          Service:
            - Amazon Bedrock
      NotificationsWithSubscribers:
        # Forecasted breach: notify only.
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetAlertEmail
        # Actual 100% breach: notify (action below performs the cutoff).
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetAlertEmail

  # Budget action: when actual spend exceeds 100% of the cap, attach the deny
  # policy to the ECS task role. This stops new Bedrock invocations until the
  # policy is manually detached and the next month's budget resets.
  BedrockBudgetAction:
    Type: AWS::Budgets::BudgetsAction
    Properties:
      BudgetName: !Ref BedrockMonthlyBudget
      NotificationType: ACTUAL
      ActionType: APPLY_IAM_POLICY
      ActionThreshold:
        Type: PERCENTAGE
        Value: 100
      ApprovalModel: AUTOMATIC
      ExecutionRoleArn: !GetAtt BudgetActionRole.Arn
      Definition:
        IamActionDefinition:
          PolicyArn: !Ref BedrockDenyPolicy
          Roles:
            - !Sub ${ProjectName}-${Environment}-ecs-task-role
      Subscribers:
        - Type: EMAIL
          Address: !Ref BudgetAlertEmail

Outputs:
  BedrockDenyPolicyArn:
    Description: ARN of the deny-all-Bedrock managed policy
    Value: !Ref BedrockDenyPolicy
    Export:
      Name: !Sub ${ProjectName}-${Environment}-bedrock-deny-policy-arn

  BedrockBudgetName:
    Description: Name of the Bedrock monthly budget
    Value: !Ref BedrockMonthlyBudget
    Export:
      Name: !Sub ${ProjectName}-${Environment}-bedrock-budget-name
