AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Pricing Assistant - CloudFront CDN with ALB Listeners'

Parameters:
  ProjectName:
    Type: String
    Default: aws-pricing-assistant
    Description: Name of the project for resource naming
  
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name

  DomainName:
    Type: String
    Default: your-domain.example.com
    Description: Domain name for the application

  HostedZoneId:
    Type: String
    Default: ''
    Description: Route 53 Hosted Zone ID for DomainName

  ALBCertificateArn:
    Type: String
    Description: ACM certificate ARN for ALB (us-west-2). Required at deploy time.

  CloudFrontCertificateArn:
    Type: String
    Description: ACM certificate ARN for CloudFront (us-east-1). Required at deploy time.

  ALBLoadBalancerArn:
    Type: String
    Description: ARN of the existing ALB to attach the HTTPS listener to. Required at deploy time.

  WebACLArn:
    Type: String
    Default: ''
    Description: Optional WAF Web ACL ARN for rate limiting (leave empty to skip WAF)

Conditions:
  HasWebACL: !Not [!Equals [!Ref WebACLArn, '']]

Resources:
  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${ProjectName} ${Environment} CDN
        WebACLId: !If [HasWebACL, !Ref WebACLArn, !Ref 'AWS::NoValue']
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: ALBOrigin
            DomainName:
              Fn::ImportValue: !Sub ${ProjectName}-${Environment}-alb-dns-name
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: ALBOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
        CacheBehaviors:
          # API routes - no caching
          - PathPattern: /api/*
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
          # WebSocket routes - no caching
          - PathPattern: /ws/*
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: false
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
          # Static assets - no caching
          - PathPattern: /assets/*
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100  # US, Canada, Europe

  # ALB HTTPS Listener
  ALBHTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn:
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-frontend-tg-arn
      LoadBalancerArn: !Ref ALBLoadBalancerArn
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref ALBCertificateArn

  # Backend API Listener Rule (NO header check - prefix list restricts access)
  BackendAPIRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn:
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-backend-tg-arn
      Conditions:
        - Field: path-pattern
          Values:
            - /api/*
      ListenerArn: !Ref ALBHTTPSListener
      Priority: 50

  # WebSocket Listener Rule (NO header check - prefix list restricts access)
  WebSocketRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn:
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-backend-tg-arn
      Conditions:
        - Field: path-pattern
          Values:
            - /ws/*
      ListenerArn: !Ref ALBHTTPSListener
      Priority: 60

  # Health Check Rule
  HealthCheckRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn:
            Fn::ImportValue: !Sub ${ProjectName}-${Environment}-backend-tg-arn
      Conditions:
        - Field: path-pattern
          Values:
            - /health
      ListenerArn: !Ref ALBHTTPSListener
      Priority: 10

Outputs:
  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub ${ProjectName}-${Environment}-cloudfront-id

  CloudFrontDomainName:
    Description: CloudFront Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${ProjectName}-${Environment}-cloudfront-domain

  ALBHTTPSListenerArn:
    Description: ALB HTTPS Listener ARN
    Value: !Ref ALBHTTPSListener
    Export:
      Name: !Sub ${ProjectName}-${Environment}-alb-https-listener-arn
