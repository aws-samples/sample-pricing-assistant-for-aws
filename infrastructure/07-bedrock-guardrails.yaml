AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Pricing Assistant - Bedrock Guardrails for Topic and Content Filtering'

Parameters:
  ProjectName:
    Type: String
    Default: aws-pricing-assistant
    Description: Name of the project for resource naming
  
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name

Resources:
  # Bedrock Guardrail
  PricingAssistantGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-guardrail
      Description: 'Guardrail to ensure AWS Pricing Assistant only responds to AWS pricing and architecture topics'
      BlockedInputMessaging: 'I can only help with AWS pricing and architecture questions. Please ask about AWS services, costs, or infrastructure design.'
      BlockedOutputsMessaging: 'I can only provide information about AWS pricing and architecture. Please rephrase your question to focus on AWS services or costs.'
      
      TopicPolicyConfig:
        TopicsConfig:
          - Name: 'Off-Topic Conversations'
            Definition: 'General conversations not related to AWS, cloud computing, or technology infrastructure'
            Examples:
              - 'What is the weather today?'
              - 'Tell me a joke'
              - 'What should I have for lunch?'
              - 'How do I cook pasta?'
            Type: 'DENY'

      ContentPolicyConfig:
        FiltersConfig:
          - Type: 'SEXUAL'
            InputStrength: 'HIGH'
            OutputStrength: 'NONE'
          - Type: 'VIOLENCE'
            InputStrength: 'HIGH'
            OutputStrength: 'NONE'
          - Type: 'HATE'
            InputStrength: 'HIGH'
            OutputStrength: 'NONE'
          - Type: 'INSULTS'
            InputStrength: 'MEDIUM'
            OutputStrength: 'NONE'
          - Type: 'MISCONDUCT'
            InputStrength: 'MEDIUM'
            OutputStrength: 'NONE'
          - Type: 'PROMPT_ATTACK'
            InputStrength: 'HIGH'
            OutputStrength: 'NONE'

      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: 'PROFANITY'

      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: 'EMAIL'
            Action: 'BLOCK'
          - Type: 'PHONE'
            Action: 'BLOCK'
          - Type: 'US_SOCIAL_SECURITY_NUMBER'
            Action: 'BLOCK'
          - Type: 'CREDIT_DEBIT_CARD_NUMBER'
            Action: 'BLOCK'

  # Guardrail Version
  GuardrailVersion:
    Type: AWS::Bedrock::GuardrailVersion
    Properties:
      GuardrailIdentifier: !Ref PricingAssistantGuardrail
      Description: !Sub 'Version 1.0 of ${ProjectName} guardrail for production use'

  # SSM Parameter for Guardrail Version
  GuardrailVersionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/pricing-assistant/${Environment}/guardrail-version'
      Type: String
      Value: "2"
      Description: !Sub 'Current guardrail version for ${ProjectName} ${Environment} environment'
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Component: guardrails

Outputs:
  GuardrailId:
    Description: ID of the Bedrock Guardrail
    Value: !Ref PricingAssistantGuardrail
    Export:
      Name: !Sub ${ProjectName}-${Environment}-guardrail-id

  GuardrailArn:
    Description: ARN of the Bedrock Guardrail
    Value: !GetAtt PricingAssistantGuardrail.GuardrailArn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-guardrail-arn

  GuardrailVersion:
    Description: Version of the Bedrock Guardrail
    Value: "2"
    Export:
      Name: !Sub ${ProjectName}-${Environment}-guardrail-version
